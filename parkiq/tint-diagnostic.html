<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ParkIQ - Tint Diagnostic</title>
  <script src="node_modules/phaser/dist/phaser.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F0F0F; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; color: #fff; font-family: monospace; }
    #game-container { width: 390px; height: 844px; }
    #log { margin-top: 16px; padding: 12px; background: #1C1C1E; border-radius: 8px; max-width: 600px; width: 100%; white-space: pre-wrap; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="log">Waiting for results...</div>
  <script>
    const logEl = document.getElementById('log');

    function appendLog(msg) {
      console.log(msg);
      logEl.textContent += msg + '\n';
    }

    // --- SVG tint diagnostic scene ---
    class TintDiagScene extends Phaser.Scene {
      constructor() { super('TintDiagScene'); }

      preload() {
        this.load.svg('car', 'public/assets/sprites/car-top-down.svg', {
          width: 96,
          height: 192,
        });
      }

      create() {
        // --- Report renderer type ---
        const rendererType = this.game.renderer.type === Phaser.WEBGL ? 'WebGL' : 'Canvas';
        appendLog('=== STEP 1: RENDERER DIAGNOSTIC ===');
        appendLog('Renderer type: ' + rendererType);
        appendLog('Phaser.AUTO: ' + Phaser.AUTO + '  Phaser.WEBGL: ' + Phaser.WEBGL + '  Phaser.CANVAS: ' + Phaser.CANVAS);

        // --- Test cars ---
        // Red player car
        const playerCar = this.add.image(4 * 48, 9 * 48, 'car');
        playerCar.setTint(0xe8320a).setTintMode(Phaser.TintModes.FILL);
        playerCar.setAngle(15);

        // Gray obstacle cars
        const carLeft  = this.add.image(1 * 48, 9 * 48, 'car');
        carLeft.setTint(0x6b7280).setTintMode(Phaser.TintModes.FILL);

        const carRight = this.add.image(7 * 48, 9 * 48, 'car');
        carRight.setTint(0x6b7280).setTintMode(Phaser.TintModes.FILL);

        const carAbove = this.add.image(4 * 48, 4 * 48, 'car');
        carAbove.setTint(0x6b7280).setTintMode(Phaser.TintModes.FILL);

        const carBelow = this.add.image(4 * 48, 14 * 48, 'car');
        carBelow.setTint(0x6b7280).setTintMode(Phaser.TintModes.FILL);

        // --- Report texture info ---
        const texture = this.textures.get('car');
        appendLog('Texture exists: ' + !!texture);
        appendLog('Texture key: ' + texture.key);
        appendLog('Texture source count: ' + texture.source.length);
        appendLog('Texture frame width: ' + texture.get().width);
        appendLog('Texture frame height: ' + texture.get().height);

        // Report tint results (actual rendered colors)
        appendLog('Player car tint: 0x' + playerCar.tintTopLeft.toString(16));
        appendLog('Obstacle car tint: 0x' + carLeft.tintTopLeft.toString(16));
        appendLog('---');
        appendLog('If both tints show 0xffffff or 0, tint is NOT applying.');
        appendLog('If player shows 0xe8320a and obstacles show 0x6b7280, tint IS applying.');
        appendLog('=== DIAGNOSTIC COMPLETE ===');
      }
    }

    // --- Game config ---
    const config = {
      type: Phaser.AUTO,
      width: 390,
      height: 844,
      backgroundColor: '#0F0F0F',
      parent: 'game-container',
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: [TintDiagScene]
    };

    const game = new Phaser.Game(config);
  </script>
</body>
</html>
