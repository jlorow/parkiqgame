<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 288 288" width="288" height="288">
  <defs>
    <!-- Asphalt texture filter -->
    <filter id="asphalt" x="0" y="0" width="288" height="288">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" seed="42" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="textured"/>
      <feComponentTransfer in="textured">
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="textured" mode="screen"/>
    </filter>

    <!-- Subtle wear pattern -->
    <filter id="wear">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
    </filter>

    <!-- Crack pattern -->
    <filter id="cracks">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="99"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.5"/>
        <feFuncG type="linear" slope="0.5"/>
        <feFuncB type="linear" slope="0.5"/>
        <feFuncA type="discrete" tableValues="0 0 0 0 0 0 0 0.15 0 0 0 0 0 0 0 0"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Base asphalt -->
  <rect width="288" height="288" fill="#2a2a30"/>

  <!-- Wear/patches overlay -->
  <rect width="288" height="288" fill="#222228" filter="url(#wear)"/>

  <!-- Subtle crack lines -->
  <rect width="288" height="288" fill="#1a1a20" filter="url(#cracks)"/>

  <!-- Worn tire track areas (subtle darker strips where cars drive) -->
  <rect x="0" y="0" width="96" height="288" fill="#25252b" opacity="0.3"/>
  <rect x="192" y="0" width="96" height="288" fill="#25252b" opacity="0.3"/>

  <!-- ── PARKING STALL DIVIDERS (bottom rows 4-5) ── -->
  <!-- Stall lines between cars in the parking area -->
  <g stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <!-- Row 4 (y=192) - parking spaces with slight offsets for realism -->
    <line x1="0.5" y1="192" x2="48.5" y2="192" opacity="0.7"/>
    <line x1="48" y1="190" x2="96" y2="192"/>
    <line x1="96" y1="192" x2="144" y2="193"/>
    <line x1="144" y1="191" x2="192" y2="192"/>
    <line x1="192" y1="193" x2="240" y2="192"/>
    <line x1="240" y1="192" x2="288" y2="191"/>

    <!-- Row 5 (y=240) - parking spaces -->
    <line x1="0.5" y1="240" x2="48.5" y2="240" opacity="0.7"/>
    <line x1="48" y1="240" x2="96" y2="241"/>
    <line x1="96" y1="240" x2="144" y2="240"/>
    <line x1="144" y1="239" x2="192" y2="240"/>
    <line x1="192" y1="241" x2="240" y2="240"/>
    <line x1="240" y1="240" x2="287.5" y2="240"/>

    <!-- Bottom curb edge -->
    <line x1="0" y1="285" x2="288" y2="285" stroke="#6b7280" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- Parking stall side dividers (vertical) -->
  <g stroke="#e8e8e8" stroke-width="1.5" opacity="0.5">
    <!-- Left edge -->
    <line x1="0.5" y1="192" x2="0.5" y2="284"/>
    <!-- Col 1 divider -->
    <line x1="48.5" y1="192" x2="48.5" y2="284"/>
    <!-- Col 2 divider -->
    <line x1="96.5" y1="192" x2="96.5" y2="284"/>
    <!-- Col 3 divider (player's stall) -->
    <line x1="144.5" y1="192" x2="144.5" y2="284"/>
    <!-- Col 4 divider -->
    <line x1="192.5" y1="192" x2="192.5" y2="284"/>
    <!-- Col 5 divider -->
    <line x1="240.5" y1="192" x2="240.5" y2="284"/>
  </g>

  <!-- ── LANE LINES (vertical column boundaries in driving area) ── -->
  <g stroke="#e8e8e8" stroke-width="2" opacity="0.55">
    <line x1="48" y1="0" x2="48" y2="192"/>
    <line x1="96" y1="0" x2="96" y2="192"/>
    <line x1="144" y1="0" x2="144" y2="192"/>
    <line x1="192" y1="0" x2="192" y2="192"/>
    <line x1="240" y1="0" x2="240" y2="192"/>
  </g>

  <!-- ── DASHED CENTER LINE (between rows 0-1 and 3-4) ── -->
  <g stroke="#e8e8e8" stroke-width="1.5" opacity="0.3">
    <!-- Centerline top half -->
    <line x1="144" y1="0" x2="144" y2="4"/>
    <line x1="144" y1="10" x2="144" y2="14"/>
    <line x1="144" y1="20" x2="144" y2="24"/>
    <line x1="144" y1="30" x2="144" y2="34"/>
    <line x1="144" y1="40" x2="144" y2="44"/>
    <line x1="144" y1="50" x2="144" y2="54"/>
    <line x1="144" y1="60" x2="144" y2="64"/>
    <line x1="144" y1="70" x2="144" y2="74"/>
    <line x1="144" y1="80" x2="144" y2="84"/>
    <line x1="144" y1="90" x2="144" y2="94"/>
    <!-- Centerline bottom half -->
    <line x1="144" y1="100" x2="144" y2="104"/>
    <line x1="144" y1="110" x2="144" y2="114"/>
    <line x1="144" y1="120" x2="144" y2="124"/>
    <line x1="144" y1="130" x2="144" y2="134"/>
    <line x1="144" y1="140" x2="144" y2="144"/>
    <line x1="144" y1="150" x2="144" y2="154"/>
    <line x1="144" y1="160" x2="144" y2="164"/>
    <line x1="144" y1="170" x2="144" y2="174"/>
    <line x1="144" y1="180" x2="144" y2="184"/>
  </g>

  <!-- ── EXIT ZONE BAY MARKINGS (top center) ── -->
  <g stroke="#e8e8e8" stroke-width="2" opacity="0.7">
    <!-- Top left curb -->
    <line x1="120" y1="0" x2="120" y2="10"/>
    <line x1="120" y1="0" x2="110" y2="0"/>
    <!-- Top right curb -->
    <line x1="168" y1="0" x2="168" y2="10"/>
    <line x1="168" y1="0" x2="178" y2="0"/>
    <!-- Bay side lines going down -->
    <line x1="120" y1="10" x2="120" y2="48" opacity="0.5"/>
    <line x1="168" y1="10" x2="168" y2="48" opacity="0.5"/>
  </g>

  <!-- ── SURFACE DETAILS ── -->

  <!-- Manhole cover at far left -->
  <g transform="translate(18, 140)">
    <circle r="7" fill="none" stroke="#3a3a44" stroke-width="1.5" opacity="0.4"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#3a3a44" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#3a3a44" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Small oil/grease stain -->
  <ellipse cx="200" cy="150" rx="6" ry="4" fill="#1a1a1a" opacity="0.25"/>
  <ellipse cx="202" cy="152" rx="3" ry="2" fill="#141414" opacity="0.2"/>

  <!-- Pavement patch near exit area -->
  <rect x="130" y="25" width="20" height="16" rx="2" fill="#32323a" opacity="0.2"/>

  <!-- Light scuff marks in the driving lane -->
  <g stroke="#35353d" stroke-width="0.8" opacity="0.2" stroke-linecap="round">
    <path d="M108,120 Q112,118 115,122" fill="none"/>
    <path d="M170,85 Q174,82 177,87" fill="none"/>
    <path d="M100,60 Q103,58 106,62" fill="none"/>
  </g>

  <!-- Curb shadow at bottom edge -->
  <linearGradient id="curbShadow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.15"/>
  </linearGradient>
  <rect x="0" y="282" width="288" height="6" fill="url(#curbShadow)"/>

  <!-- Subtle vignette edges -->
  <linearGradient id="vignetteH" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#000" stop-opacity="0.08"/>
    <stop offset="10%" stop-color="#000" stop-opacity="0"/>
    <stop offset="90%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.08"/>
  </linearGradient>
  <rect x="0" y="0" width="288" height="288" fill="url(#vignetteH)"/>

  <linearGradient id="vignetteV" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000" stop-opacity="0.06"/>
    <stop offset="50%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
  </linearGradient>
  <rect x="0" y="0" width="288" height="288" fill="url(#vignetteV)"/>
</svg>
